description: >-
  FinOps view of Mobula spend. Mobula bills a flat monthly subscription per plan
  (Free, Start-up, Growth, Enterprise) that includes a monthly credit
  (compute-unit) allowance. REST calls draw down credits - most at 1 credit,
  heavier endpoints (token security, DeFi positions) at 10, batch price-history
  at 5 per asset. WebSocket streams cost 1 credit per minute open plus the
  underlying endpoint cost; webhooks cost 1 credit per trigger; indexing worker
  hours cost 500 credits. Cost is a function of plan tier plus credit burn.
notes: >-
  Per-plan prices and per-endpoint credit weights are subject to change; verify
  against Mobula's pricing pages during reconciliation.
