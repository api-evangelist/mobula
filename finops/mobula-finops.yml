meters:
- name: plan_subscription
  description: Flat monthly plan fee (Free $0, Start-up $50, Growth $400, Enterprise from $750).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: rest_credits
  description: Credits consumed by REST calls; most endpoints cost 1 credit, heavier ones more.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: heavy_endpoint_credits
  description: Credits for heavy endpoints such as token security and DeFi positions (10 credits each).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: batch_credits
  description: Credits for batch endpoints such as price-history (5 credits per asset).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: websocket_credits
  description: Credits for WebSocket streams - 1 per minute open plus underlying endpoint cost.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - stream
- name: webhook_credits
  description: Credits per webhook trigger (1 credit each).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - webhook
- name: indexing_credits
  description: Credits for indexing worker hours (500 credits per worker hour).
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - worker
principles:
- name: Visibility
  description: Track monthly credit burn per endpoint and stream against the plan allowance in the Mobula dashboard.
- name: Allocation
  description: Issue separate API keys per workload/team and map credit consumption to internal cost centers.
- name: Optimization
  description: Batch reads via /market/multi-data, cache market data client-side, avoid heavy 10-credit endpoints when a 1-credit call suffices, and close idle WebSocket connections to stop per-minute credit burn.
- name: Accountability
  description: Assign owners per key/project and review credit spend monthly against the plan allowance before it forces an upgrade.
