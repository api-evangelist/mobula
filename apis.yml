aid: mobula
url: https://raw.githubusercontent.com/api-evangelist/mobula/refs/heads/main/apis.yml
name: Mobula
kind: company
description: Mobula is an onchain-native crypto and web3 market data provider. Its
  REST and WebSocket APIs serve real-time and historical token prices, asset and token
  metadata, trading pairs and OHLCV candles, and multichain wallet portfolio, net-worth
  history, and transaction data across EVM, Solana, TON, and other chains, all keyed
  off a single free API key.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Crypto
- Web3
- Market Data
- Blockchain
- Wallet
- Real Time
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
apis:
- aid: mobula:mobula-market-data-api
  name: Mobula Market Data API
  tags:
  - Market Data
  - Price
  - Crypto
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.mobula.io/rest-api-reference/endpoint/market-data
  baseURL: https://api.mobula.io/api/1
  properties:
  - url: https://docs.mobula.io/rest-api-reference/endpoint/market-data
    type: Documentation
  - url: https://docs.mobula.io/rest-api-reference/introduction
    type: APIReference
  - url: openapi/mobula-openapi.yml
    type: OpenAPI
  description: Real-time market data for any token by asset name, symbol, id, or contract
    address (with blockchain), returning price, market cap, diluted market cap, volume,
    liquidity, ATH/ATL, multi-timeframe price change, and contract details.
- aid: mobula:mobula-multi-data-api
  name: Mobula Multi-Data API
  tags:
  - Market Data
  - Batch
  - Price
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.mobula.io/rest-api-reference/introduction
  baseURL: https://api.mobula.io/api/1
  properties:
  - url: https://docs.mobula.io/rest-api-reference/introduction
    type: Documentation
  - url: openapi/mobula-openapi.yml
    type: OpenAPI
  description: Batched market data for many assets in a single request via comma-separated
    asset names or contract addresses, returning the same market payload per asset
    for efficient multi-token dashboards.
- aid: mobula:mobula-market-history-api
  name: Mobula Market History API
